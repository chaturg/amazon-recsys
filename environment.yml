name: recsys
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # ── Core ────────────────────────────────────────────────────────────────────
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.11.0
  - scikit-learn>=1.3.0
  - pyarrow>=13.0.0

  # ── PyTorch (CPU — GPU variant installed via pip below) ───────────────────
  - pytorch>=2.0.0
  - cpuonly

  # ── Utilities ────────────────────────────────────────────────────────────────
  - tqdm>=4.65.0
  - jupyter
  - ipykernel

  - pip:
    # ── Retrieval ──────────────────────────────────────────────────────────────
    - faiss-cpu>=1.7.4
    - transformers>=4.35.0
    - sentence-transformers>=2.2.0

    # ── HuggingFace ────────────────────────────────────────────────────────────
    - huggingface-hub>=0.19.0
    - datasets>=2.14.0

    # ── LLM / Demo ─────────────────────────────────────────────────────────────
    - anthropic>=0.20.0
    - gradio>=4.0.0
    - plotly>=5.17.0

    # ── ALS baseline ───────────────────────────────────────────────────────────
    - implicit>=0.7.0

    # ── Data pipeline ──────────────────────────────────────────────────────────
    - beautifulsoup4>=4.12.0
    - lxml>=4.9.0
    - python-dotenv>=1.0.0
